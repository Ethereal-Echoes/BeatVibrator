name: Cloud Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 允许你在网页上点击按钮手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 现代安卓项目通用 JDK 17，如果报错可尝试改为 '11'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予 Gradle 运行权限
        run: chmod +x gradlew

      - name: 开始编译 Debug 版 APK
        run: ./gradlew assembleDebug

      - name: 上传编译出的 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: BeatVibrator-APK
          path: "**/build/outputs/apk/debug/*.apk"
